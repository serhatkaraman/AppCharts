replicaCount: 4

image:
  repository: serhatkaraman/javaapp
  tag: init
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: docker-secret

service:
  port: 9001

ingress:
  host: canary-java.myturkishdish.com
  className: nginx
  tlsSecret: canary-java-tls

canary:
  steps:
    - setWeight: 25
    - pause: {}
    - setWeight: 50
    - pause: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

logging:
  enabled: true
  path: /var/log/app
  level: INFO
  maxFileSize: 1GB
  maxHistory: 7
  totalSizeCap: 10GB
  queueSize: 8192
  neverBlock: true
  pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  console:
    enabled: false
  tmpfs:
    enabled: true
    sizeLimit: 1Gi
