apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "server.fullname" . }}
  labels:
    {{- include "server.labels" . | nindent 4 }}
spec:
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if .Values.logging.enabled }}
        checksum/logback: {{ include (print $.Template.BasePath "/logging-configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "server.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- if or .Values.env .Values.logging.enabled }}
          env:
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.logging.enabled }}
            - name: LOGGING_CONFIG
              value: /config/logback.xml
            {{- end }}
          {{- end }}
          {{- with .Values.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            tcpSocket:
              port: {{ .Values.livenessProbe.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.readinessProbe.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if .Values.logging.enabled }}
          volumeMounts:
            - name: logback-config
              mountPath: /config
              readOnly: true
            - name: app-logs
              mountPath: {{ .Values.logging.path }}
          {{- end }}
        {{- if and .Values.logging.enabled .Values.logging.sidecar.enabled }}
        - name: log-shipper
          image: {{ .Values.logging.sidecar.image }}
          args: ["-c", "/fluent-bit/etc/conf/fluent-bit.conf"]
          volumeMounts:
            - name: app-logs
              mountPath: {{ .Values.logging.path }}
              readOnly: true
            - name: flb-sidecar-config
              mountPath: /fluent-bit/etc/conf
            - name: flb-sidecar-storage
              mountPath: /var/flb-storage
          resources:
            {{- toYaml .Values.logging.sidecar.resources | nindent 12 }}
        {{- end }}
      {{- if .Values.logging.enabled }}
      volumes:
        - name: logback-config
          configMap:
            name: {{ include "server.fullname" . }}-logback
        - name: app-logs
          emptyDir:
            {{- if .Values.logging.tmpfs.enabled }}
            medium: Memory
            sizeLimit: {{ .Values.logging.tmpfs.sizeLimit }}
            {{- end }}
        {{- if .Values.logging.sidecar.enabled }}
        - name: flb-sidecar-config
          configMap:
            name: {{ include "server.fullname" . }}-flb-sidecar
        - name: flb-sidecar-storage
          emptyDir: {}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- range . }}
        - maxSkew: {{ .maxSkew }}
          topologyKey: {{ .topologyKey }}
          whenUnsatisfiable: {{ .whenUnsatisfiable }}
          labelSelector:
            matchLabels:
              {{- include "server.selectorLabels" $ | nindent 14 }}
        {{- end }}
      {{- end }}
