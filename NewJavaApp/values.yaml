replicaCount: 4
image:
  repository: serhatkaraman/javaapp
  tag: master-4c6208
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: docker-secret
service:
  type: ClusterIP
  port: 9001
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/hostname: evently-java.myturkishdish.com
  hosts:
    - host: evently-java.myturkishdish.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: java-tls
      hosts:
        - evently-java.myturkishdish.com
env: []
envFrom: []
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
livenessProbe:
  enabled: true
  port: 9001
  initialDelaySeconds: 30
  periodSeconds: 20
  failureThreshold: 3
readinessProbe:
  enabled: true
  port: 9001
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3
nodeSelector: {}
tolerations: []

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - node-1
                - node-2


topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
podAnnotations: {}
podLabels: {}
