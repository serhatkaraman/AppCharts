replicaCount: 4

# App X: critical / high-priority (preempts App Y when scaling under load)
priorityClassName: app-critical

image:
  repository: serhatkaraman/javaapp
  tag: master-4c6208
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: docker-secret
service:
  type: ClusterIP
  port: 9001
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/hostname: evently-java.myturkishdish.com
  hosts:
    - host: evently-java.myturkishdish.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: java-tls
      hosts:
        - evently-java.myturkishdish.com
env: []
envFrom: []
logging:
  enabled: true
  path: /var/log/app
  level: INFO
  maxFileSize: 1GB
  maxHistory: 7
  totalSizeCap: 10GB
  queueSize: 8192
  neverBlock: true
  pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  console:
    enabled: false
  tmpfs:
    enabled: true
    sizeLimit: 1Gi
  sidecar:
    enabled: true
    image: fluent/fluent-bit:3.2.4
    forwardHost: dreamgames-case-fluent-bit-aggregator.elasticsearch.svc.cluster.local
    forwardPort: 24224
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 50m
        memory: 64Mi
resources:
  requests:
    cpu: 100m
    memory: 100Mi
  limits:
    cpu: 100m
    memory: 100Mi
hpa:
  enabled: true
  minReplicas: 4
  maxReplicas: 8
  targetCPUUtilizationPercentage: 70
livenessProbe:
  enabled: true
  port: 9001
  initialDelaySeconds: 30
  periodSeconds: 20
  failureThreshold: 3
readinessProbe:
  enabled: true
  port: 9001
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3
nodeSelector: {}
tolerations: []

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - node-1
                - node-2


topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: DoNotSchedule
podAnnotations: {}
podLabels: {}
