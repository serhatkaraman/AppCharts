replicaCount: 1
# App Y: pausable / preemptible
priorityClassName: app-preemptible
# Active-pausing controller: pauses Y (this app) when X (NewJavaApp) scales up
pauser:
  enabled: true
  image: alpine/k8s:1.31.1
  intervalSeconds: 20
  criticalNamespace: newjavaapp
  criticalHpa: newjavaapp
  pausableDeployment: dreamgames-case-dev-javaapp
  resumeReplicas: 1
image:
  repository: serhatkaraman/javaapp
  tag: master-280f75
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: docker-secret
service:
  type: ClusterIP
  port: 9001
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/hostname: java.myturkishdish.com
  hosts:
    - host: java.myturkishdish.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: java-tls
      hosts:
        - java.myturkishdish.com
env: []
envFrom: []
logging:
  enabled: true
  path: /var/log/app
  level: INFO
  maxFileSize: 1GB
  maxHistory: 7
  totalSizeCap: 10GB
  queueSize: 8192
  neverBlock: true
  pattern: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
  console:
    enabled: false
  tmpfs:
    enabled: true
    sizeLimit: 1Gi
  sidecar:
    enabled: true
    image: fluent/fluent-bit:3.2.4
    forwardHost: dreamgames-case-fluent-bit-aggregator.elasticsearch.svc.cluster.local
    forwardPort: 24224
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
livenessProbe:
  enabled: true
  port: 9001
  initialDelaySeconds: 30
  periodSeconds: 20
  failureThreshold: 3
readinessProbe:
  enabled: true
  port: 9001
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3
nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}
